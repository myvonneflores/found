app = "found-web"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    SITE_URL = "https://www.found-places.com"
    NEXT_PUBLIC_SITE_URL = "https://www.found-places.com"

[env]
  HOSTNAME = "0.0.0.0"
  PORT = "3000"
  SITE_URL = "https://www.found-places.com"
  NEXT_PUBLIC_SITE_URL = "https://www.found-places.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
