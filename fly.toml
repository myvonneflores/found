app = "found-api"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python manage.py migrate --noinput"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "45s"
    method = "GET"
    path = "/api/health/"

    [http_service.checks.headers]
      Host = "api.found-places.com"
      "X-Forwarded-Proto" = "https"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
