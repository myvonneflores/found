name: Deploy to Fly

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-production-deploy
  cancel-in-progress: false

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FOUND_API }}

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web
        working-directory: frontend
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FOUND_WEB }}
